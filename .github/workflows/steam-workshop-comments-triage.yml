name: Steam Workshop Comment Triage Packet Check

on:
  workflow_dispatch:
    inputs:
      inbox_issue_number:
        description: "Steam Workshop comment inbox issue number"
        required: true
        type: number

concurrency:
  group: steam-workshop-comments-triage-${{ inputs.inbox_issue_number }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Validate Codex/App Server triage packet
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          packet_path="$(mktemp)"
          trap 'rm -f "${packet_path}"' EXIT
          python scripts/workshop_comments_triage.py \
            --inbox-issue-number "${{ inputs.inbox_issue_number }}" \
            --max-items 10 \
            --max-body-chars 4000 \
            --max-github-pages 10 \
            --timeout-seconds 20 \
            --skip-author ToaruPen \
            > "${packet_path}"
          python - "${packet_path}" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as handle:
              packet = json.load(handle)
          print(f"triage packet schema={packet['schema']} items={len(packet['items'])}")
          PY
