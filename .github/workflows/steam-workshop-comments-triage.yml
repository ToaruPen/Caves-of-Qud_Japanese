name: Steam Workshop Comment Triage Packet

on:
  workflow_dispatch:
    inputs:
      inbox_issue_number:
        description: "Steam Workshop comment inbox issue number"
        required: true
        type: number

concurrency:
  group: steam-workshop-comments-triage-${{ inputs.inbox_issue_number }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Prepare Codex/App Server triage packet
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python scripts/workshop_comments_triage.py \
            --inbox-issue-number "${{ inputs.inbox_issue_number }}" \
            --max-items 10 \
            --max-body-chars 4000 \
            --max-github-pages 10 \
            --timeout-seconds 20 \
            --skip-author ToaruPen \
            > steam-workshop-triage-packet.json
          sed -n '1,200p' steam-workshop-triage-packet.json

      - uses: actions/upload-artifact@v4
        with:
          name: steam-workshop-triage-packet
          path: steam-workshop-triage-packet.json
