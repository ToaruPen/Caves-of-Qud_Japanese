name: Steam Workshop Comment Inbox

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch and sanitize without writing GitHub issues/comments"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: steam-workshop-comments-inbox
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Collect Steam Workshop comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          args=(
            collect
            --metadata-path steam/workshop_metadata.json
            --max-comments-per-run 20
            --max-pages 5
            --page-size 20
            --max-body-chars 4000
            --timeout-seconds 20
            --max-response-bytes 2097152
            --max-github-pages 10
          )
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          python scripts/workshop_comments_inbox.py "${args[@]}"
